name: Setup Go
description: >
  Checks out the repository and sets up Go with module caching. Verifies go.sum
  integrity after setup. Used as a building block in all Go CI workflows.

inputs:
  go-version:
    description: >
      Explicit Go version to use (e.g. '1.26'). When set, takes
      precedence over go-version-file.
    required: false
    default: ''

  go-version-file:
    description: >
      Path to go.mod file to determine the Go version. Used when
      go-version is not set. Defaults to go.mod in the working directory.
    required: false
    default: 'go.mod'

  working-directory:
    description: >
      Directory containing go.mod. Defaults to repo root.
      Set this for monorepos where the Go module lives in a subdirectory.
    required: false
    default: '.'

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ inputs.go-version }}
        go-version-file: ${{ inputs.go-version == '' && inputs.go-version-file || '' }}
        cache-dependency-path: ${{ inputs.working-directory }}/go.sum

    - name: Verify modules
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: go mod verify
