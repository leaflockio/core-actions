name: Back-merge
description: >
  Syncs pre-main with main after a production release or hotfix merge
  to keep pre-main up to date with version bumps, changelog changes,
  and any hotfix patches.

inputs:
  token:
    description: GitHub App token for pushing to protected branches
    required: true
  strategy:
    description: 'Sync strategy: merge or force-sync'
    required: false
    default: 'merge'

outputs:
  result:
    description: Result of the sync ('success' or 'failed')
    value: ${{ steps.sync.outputs.result }}

runs:
  using: composite
  steps:
    - name: Configure git access
      shell: bash
      run: |
        git remote set-url origin "https://x-access-token:${{ inputs.token }}@github.com/${GITHUB_REPOSITORY}.git"

    - name: Sync pre-main with main
      id: sync
      shell: bash
      run: |
        case "${{ inputs.strategy }}" in
          merge)
            SCRIPT="${GITHUB_ACTION_PATH}/../../../scripts/release/back-merge.sh"
            ;;
          force-sync)
            SCRIPT="${GITHUB_ACTION_PATH}/../../../scripts/release/force-sync.sh"
            ;;
          *)
            echo "::error::Invalid strategy '${{ inputs.strategy }}'. Must be 'merge' or 'force-sync'."
            exit 1
            ;;
        esac

        if bash "$SCRIPT"; then
          echo "result=success" >> "${GITHUB_OUTPUT}"
        else
          echo "result=failed" >> "${GITHUB_OUTPUT}"
          exit 1
        fi
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        LEFTHOOK: 0
