name: Back-merge
description: >
  Syncs pre-main with main after a production release or hotfix merge
  to keep pre-main up to date with version bumps, changelog changes,
  and any hotfix patches.

inputs:
  token:
    description: GitHub App token for pushing to protected branches
    required: true
  strategy:
    description: 'Sync strategy: merge or force-sync'
    required: false
    default: 'merge'

outputs:
  back_merge_result:
    description: Result of the back-merge ('success' or 'conflict')
    value: ${{ steps.merge.outputs.result }}

runs:
  using: composite
  steps:
    - name: Sync pre-main with main
      id: merge
      shell: bash
      run: |
        if [ "${{ inputs.strategy }}" = "force-sync" ]; then
          SCRIPT="${GITHUB_ACTION_PATH}/../../../scripts/release/force-sync.sh"
        else
          SCRIPT="${GITHUB_ACTION_PATH}/../../../scripts/release/back-merge.sh"
        fi

        if bash "$SCRIPT"; then
          echo "result=success" >> "${GITHUB_OUTPUT}"
        else
          echo "result=conflict" >> "${GITHUB_OUTPUT}"
          exit 1
        fi
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        LEFTHOOK: 0
