name: Update Major Tag
description: >
  Moves (or creates) the major version tag pointer after a release.
  For example, after v1.2.0 is released, this action force-moves
  the v1 tag to point to v1.2.0.

inputs:
  version:
    description: The newly released version string (e.g. '1.2.0' or '2.0.0-beta.1')
    required: true

  enabled:
    description: Whether to update the major tag pointer
    required: false
    default: 'true'

  token:
    description: GitHub App token for pushing tags
    required: true

outputs:
  major-tag:
    description: The major tag that was updated or created (e.g. 'v1')
    value: ${{ steps.update.outputs.major_tag }}

  action:
    description: What happened — 'created', 'updated', or 'skipped'
    value: ${{ steps.update.outputs.action }}

runs:
  using: composite
  steps:
    - name: Update major version tag
      id: update
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
        ENABLED: ${{ inputs.enabled }}
        GITHUB_TOKEN: ${{ inputs.token }}
      run: |
        if [ "$ENABLED" != "true" ]; then
          echo "Major tag update disabled — skipping."
          echo "action=skipped" >> "$GITHUB_OUTPUT"
          echo "major_tag=" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # Extract major version (handles both "1.2.0" and "v1.2.0")
        MAJOR=$(echo "$VERSION" | sed 's/^v//' | cut -d. -f1)
        MAJOR_TAG="v${MAJOR}"
        RELEASE_TAG="v${VERSION#v}"

        echo "Release tag: ${RELEASE_TAG}"
        echo "Major tag:   ${MAJOR_TAG}"

        # Check if major tag already exists on remote
        if git ls-remote --tags origin "refs/tags/${MAJOR_TAG}" | grep -q "${MAJOR_TAG}"; then
          echo "Moving existing ${MAJOR_TAG} → ${RELEASE_TAG}"
          git tag -f "$MAJOR_TAG" "$RELEASE_TAG"
          git push -f origin "refs/tags/${MAJOR_TAG}"
          echo "action=updated" >> "$GITHUB_OUTPUT"
        else
          echo "Creating new ${MAJOR_TAG} → ${RELEASE_TAG}"
          git tag "$MAJOR_TAG" "$RELEASE_TAG"
          git push origin "refs/tags/${MAJOR_TAG}"
          echo "action=created" >> "$GITHUB_OUTPUT"
        fi

        echo "major_tag=${MAJOR_TAG}" >> "$GITHUB_OUTPUT"

    - name: Major tag summary
      shell: bash
      env:
        ACTION: ${{ steps.update.outputs.action }}
        MAJOR_TAG: ${{ steps.update.outputs.major_tag }}
        VERSION: ${{ inputs.version }}
      run: |
        echo "## Major Tag" >> "$GITHUB_STEP_SUMMARY"
        echo "| Detail | Value |" >> "$GITHUB_STEP_SUMMARY"
        echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
        case "$ACTION" in
          created)
            echo "| **Action** | Created |" >> "$GITHUB_STEP_SUMMARY"
            echo "| **Tag** | \`${MAJOR_TAG}\` → \`v${VERSION#v}\` |" >> "$GITHUB_STEP_SUMMARY"
            ;;
          updated)
            echo "| **Action** | Updated |" >> "$GITHUB_STEP_SUMMARY"
            echo "| **Tag** | \`${MAJOR_TAG}\` → \`v${VERSION#v}\` |" >> "$GITHUB_STEP_SUMMARY"
            ;;
          skipped)
            echo "| **Action** | Skipped (disabled) |" >> "$GITHUB_STEP_SUMMARY"
            ;;
        esac
