name: Back-merge

on:
  workflow_call:
    inputs:
      core-actions-ref:
        description: Git ref for core-actions checkout (tag, branch, or SHA)
        type: string
        required: false
        default: 'main'
      strategy:
        description: 'Sync strategy: merge or force-sync'
        type: string
        required: false
        default: 'merge'

      owner:
        description: GitHub owner for app token scope (defaults to repository owner)
        type: string
        required: false
        default: ''

    secrets:
      APP_ID:
        description: GitHub App ID for locket-ci
        required: true

      APP_PRIVATE_KEY:
        description: GitHub App private key for locket-ci
        required: true

permissions:
  contents: read

concurrency:
  group: back-merge
  cancel-in-progress: false

jobs:
  back-merge:
    name: Back-merge
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ inputs.owner || github.repository_owner }}

      - uses: actions/checkout@v4
        with:
          repository: leaflockio/core-actions
          ref: ${{ inputs.core-actions-ref }}
          path: .git/modules/core-actions
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure git identity
        env:
          APP_ID: ${{ secrets.APP_ID }}
        run: |
          git config user.name "locket-ci[bot]"
          git config user.email "${APP_ID}+locket-ci[bot]@users.noreply.github.com"

      - uses: ./.git/modules/core-actions/actions/release/back-merge
        with:
          token: ${{ steps.app-token.outputs.token }}
          strategy: ${{ inputs.strategy }}
