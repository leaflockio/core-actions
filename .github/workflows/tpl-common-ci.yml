name: Quality

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version (for cspell, prettier, markdownlint)
        type: string
        required: false
        default: '22'

      core-actions-ref:
        description: Git ref for core-actions checkout (tag, branch, or SHA)
        type: string
        required: false
        default: 'main'

      owner:
        description: GitHub owner for app token scope (defaults to repository owner)
        type: string
        required: false
        default: ''

    secrets:
      APP_ID:
        description: GitHub App ID — required when calling from a repo that cannot access core-actions with the default token
        required: false

      APP_PRIVATE_KEY:
        description: GitHub App private key (pairs with APP_ID)
        required: false

      GITLEAKS_LICENSE:
        description: License key for Gitleaks secret scanner
        required: false

permissions:
  contents: read
  pull-requests: read

jobs:
  gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      HAS_APP_CREDS: ${{ secrets.APP_ID != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate cross-repo token
        if: env.HAS_APP_CREDS == 'true'
        id: cross-repo-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ inputs.owner || github.repository_owner }}

      - uses: actions/checkout@v4
        with:
          repository: leaflockio/core-actions
          ref: ${{ inputs.core-actions-ref }}
          path: .git/modules/core-actions
          token: ${{ steps.cross-repo-token.outputs.token || github.token }}

      - uses: ./.git/modules/core-actions/actions/ci/quality-gate
        with:
          scripts-dir: .git/modules/core-actions/scripts/common
          pr-base-sha: ${{ github.event.pull_request.base.sha }}

  lint:
    name: Quality Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      HAS_APP_CREDS: ${{ secrets.APP_ID != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate cross-repo token
        if: env.HAS_APP_CREDS == 'true'
        id: cross-repo-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ inputs.owner || github.repository_owner }}

      - uses: actions/checkout@v4
        with:
          repository: leaflockio/core-actions
          ref: ${{ inputs.core-actions-ref }}
          path: .git/modules/core-actions
          token: ${{ steps.cross-repo-token.outputs.token || github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install tools
        run: npm ci

      - uses: ./.git/modules/core-actions/actions/ci/quality-lint
        with:
          scripts-dir: .git/modules/core-actions/scripts/common
          pr-base-sha: ${{ github.event.pull_request.base.sha }}

  links:
    name: Quality Links
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      HAS_APP_CREDS: ${{ secrets.APP_ID != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate cross-repo token
        if: env.HAS_APP_CREDS == 'true'
        id: cross-repo-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ inputs.owner || github.repository_owner }}

      - uses: actions/checkout@v4
        with:
          repository: leaflockio/core-actions
          ref: ${{ inputs.core-actions-ref }}
          path: .git/modules/core-actions
          token: ${{ steps.cross-repo-token.outputs.token || github.token }}

      - uses: ./.git/modules/core-actions/actions/ci/quality-links
        with:
          scripts-dir: .git/modules/core-actions/scripts/common
          pr-base-sha: ${{ github.event.pull_request.base.sha }}

  actionlint:
    name: Action Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install actionlint
        env:
          ACTIONLINT_VERSION: 1.7.7
        run: |
          curl -sL "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" -o actionlint.tar.gz
          tar -xzf actionlint.tar.gz actionlint
          rm actionlint.tar.gz

      - name: Lint GitHub Actions
        run: ./actionlint

  gitleaks:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      HAS_APP_CREDS: ${{ secrets.APP_ID != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate cross-repo token
        if: env.HAS_APP_CREDS == 'true'
        id: cross-repo-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ inputs.owner || github.repository_owner }}

      - uses: actions/checkout@v4
        with:
          repository: leaflockio/core-actions
          ref: ${{ inputs.core-actions-ref }}
          path: .git/modules/core-actions
          token: ${{ steps.cross-repo-token.outputs.token || github.token }}

      - uses: ./.git/modules/core-actions/actions/common/gitleaks
        with:
          license: ${{ secrets.GITLEAKS_LICENSE }}
          require-license: ${{ secrets.GITLEAKS_LICENSE != '' && 'true' || 'false' }}
