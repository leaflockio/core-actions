name: Shell CI

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version (for bats via npm)
        type: string
        required: false
        default: '22'

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Lint shell scripts
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          FILES=$(git diff --name-only --diff-filter=ACMR "$PR_BASE_SHA"...HEAD -- '*.sh')
          if [ -z "$FILES" ]; then
            echo "No shell files changed in this PR."
            exit 0
          fi
          echo "$FILES" | xargs npx shellcheck -x --source-path=SCRIPTDIR

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Install kcov
        env:
          KCOV_VERSION: '42'
        run: |
          curl -sSfL "https://github.com/SimonKagstrom/kcov/releases/download/v${KCOV_VERSION}/kcov-amd64.tar.gz" -o kcov.tar.gz
          sudo tar -xzf kcov.tar.gz -C /
          rm kcov.tar.gz

      - name: Run tests with coverage
        run: npm run test:coverage
