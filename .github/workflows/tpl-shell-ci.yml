name: Shell CI

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version (for bats via npm)
        type: string
        required: false
        default: '22'
      coverage-tag:
        description: Coverage baseline tag (leave empty for legacy single-baseline mode)
        type: string
        required: false
        default: ''

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Lint shell scripts
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          FILES=$(git diff --name-only --diff-filter=ACMR "$PR_BASE_SHA"...HEAD -- '*.sh')
          if [ -z "$FILES" ]; then
            echo "No shell files changed in this PR."
            exit 0
          fi
          echo "$FILES" | xargs npx shellcheck -x --source-path=SCRIPTDIR

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Restore kcov image cache
        id: kcov-cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/kcov-image.tar
          key: kcov-bats-image-v1

      - name: Load cached kcov image
        if: steps.kcov-cache.outputs.cache-hit == 'true'
        run: docker load -i ${{ runner.temp }}/kcov-image.tar

      - name: Run tests with coverage
        env:
          COVERAGE_TAG: ${{ inputs.coverage-tag }}
        run: bash scripts/shell/coverage.sh --docker

      - name: Save kcov image to cache
        if: steps.kcov-cache.outputs.cache-hit != 'true'
        run: docker save leaflock/kcov-bats -o ${{ runner.temp }}/kcov-image.tar
