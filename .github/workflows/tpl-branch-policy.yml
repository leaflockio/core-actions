name: Branch Policy

on:
  workflow_call:

permissions: {}

jobs:
  branch-policy:
    name: Branch Policy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate PR target branch
        shell: bash
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          echo "PR: $HEAD_REF -> $BASE_REF"

          if [ "$BASE_REF" = "main" ]; then
            if echo "$HEAD_REF" | grep -qE '^(pre-main|hotfix/.+)$'; then
              echo "::notice::$HEAD_REF is allowed to target main"
            else
              echo "::error::$HEAD_REF cannot target main. Only pre-main and hotfix/* branches can target main."
              exit 1
            fi
          fi

          echo "::notice::Branch policy check passed"
