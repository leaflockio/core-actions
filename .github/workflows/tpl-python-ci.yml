name: Python CI

on:
  workflow_call:
    inputs:
      python-version:
        description: Python version to use
        type: string
        required: false
        default: '3.12'

      working-directory:
        description: Directory containing requirements.txt or pyproject.toml
        type: string
        required: false
        default: '.'

      package-manager:
        description: Package manager (pip or poetry)
        type: string
        required: false
        default: pip

      lint-command:
        description: Command to run for linting
        type: string
        required: false
        default: ruff check

      build-command:
        description: Command to run for building (e.g. python -m build)
        type: string
        required: false
        default: python -m build

      core-actions-ref:
        description: Git ref for core-actions checkout (tag, branch, or SHA)
        type: string
        required: false
        default: 'main'

      owner:
        description: GitHub owner for app token scope (defaults to repository owner)
        type: string
        required: false
        default: ''

    secrets:
      APP_ID:
        description: GitHub App ID — required when calling from a repo that cannot access core-actions with the default token
        required: false

      APP_PRIVATE_KEY:
        description: GitHub App private key (pairs with APP_ID)
        required: false

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      HAS_APP_CREDS: ${{ secrets.APP_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate cross-repo token
        if: env.HAS_APP_CREDS == 'true'
        id: cross-repo-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ inputs.owner || github.repository_owner }}

      - uses: actions/checkout@v4
        with:
          repository: leaflockio/core-actions
          ref: ${{ inputs.core-actions-ref }}
          path: .core-actions
          token: ${{ steps.cross-repo-token.outputs.token || github.token }}

      - uses: ./.core-actions/actions/python/setup
        with:
          python-version: ${{ inputs.python-version }}
          working-directory: ${{ inputs.working-directory }}
          package-manager: ${{ inputs.package-manager }}

      - name: Lint
        working-directory: ${{ inputs.working-directory }}
        env:
          LINT_CMD: ${{ inputs.lint-command }}
        run: eval "$LINT_CMD"

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      HAS_APP_CREDS: ${{ secrets.APP_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate cross-repo token
        if: env.HAS_APP_CREDS == 'true'
        id: cross-repo-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ inputs.owner || github.repository_owner }}

      - uses: actions/checkout@v4
        with:
          repository: leaflockio/core-actions
          ref: ${{ inputs.core-actions-ref }}
          path: .core-actions
          token: ${{ steps.cross-repo-token.outputs.token || github.token }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install dependencies
        working-directory: ${{ inputs.working-directory }}
        env:
          PKG_MANAGER: ${{ inputs.package-manager }}
        run: |
          if [ "$PKG_MANAGER" = "poetry" ]; then
            pip install poetry
            poetry install
          else
            pip install -r requirements.txt
          fi

      - name: Run coverage
        working-directory: ${{ inputs.working-directory }}
        run: bash .core-actions/scripts/python/coverage.sh

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      HAS_APP_CREDS: ${{ secrets.APP_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate cross-repo token
        if: env.HAS_APP_CREDS == 'true'
        id: cross-repo-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ inputs.owner || github.repository_owner }}

      - uses: actions/checkout@v4
        with:
          repository: leaflockio/core-actions
          ref: ${{ inputs.core-actions-ref }}
          path: .core-actions
          token: ${{ steps.cross-repo-token.outputs.token || github.token }}

      - uses: ./.core-actions/actions/python/setup
        with:
          python-version: ${{ inputs.python-version }}
          working-directory: ${{ inputs.working-directory }}
          package-manager: ${{ inputs.package-manager }}

      - name: Build
        working-directory: ${{ inputs.working-directory }}
        env:
          BUILD_CMD: ${{ inputs.build-command }}
        run: eval "$BUILD_CMD"
