name: Node CI

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version to use
        type: string
        required: false
        default: '22'

      working-directory:
        description: Directory containing package.json
        type: string
        required: false
        default: '.'

      lint-command:
        description: Command to run for linting
        type: string
        required: false
        default: npm run lint

      build-command:
        description: Command to run for building
        type: string
        required: false
        default: npm run build

      core-actions-ref:
        description: Git ref for core-actions checkout (tag, branch, or SHA)
        type: string
        required: false
        default: 'main'

    secrets:
      APP_ID:
        description: GitHub App ID — required when calling from a repo that cannot access core-actions with the default token
        required: false

      APP_PRIVATE_KEY:
        description: GitHub App private key (pairs with APP_ID)
        required: false

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      HAS_APP_CREDS: ${{ secrets.APP_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate cross-repo token
        if: env.HAS_APP_CREDS == 'true'
        id: cross-repo-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: leaflockio

      - uses: actions/checkout@v4
        with:
          repository: leaflockio/core-actions
          ref: ${{ inputs.core-actions-ref }}
          path: .core-actions
          token: ${{ steps.cross-repo-token.outputs.token || github.token }}

      - uses: ./.core-actions/actions/node/setup
        with:
          node-version: ${{ inputs.node-version }}
          working-directory: ${{ inputs.working-directory }}

      - name: Lint
        working-directory: ${{ inputs.working-directory }}
        env:
          LINT_CMD: ${{ inputs.lint-command }}
        run: eval "$LINT_CMD"

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      HAS_APP_CREDS: ${{ secrets.APP_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate cross-repo token
        if: env.HAS_APP_CREDS == 'true'
        id: cross-repo-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: leaflockio

      - uses: actions/checkout@v4
        with:
          repository: leaflockio/core-actions
          ref: ${{ inputs.core-actions-ref }}
          path: .core-actions
          token: ${{ steps.cross-repo-token.outputs.token || github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install dependencies
        working-directory: ${{ inputs.working-directory }}
        run: npm ci

      - name: Run coverage
        working-directory: ${{ inputs.working-directory }}
        run: bash .core-actions/scripts/node/coverage.sh

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      HAS_APP_CREDS: ${{ secrets.APP_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate cross-repo token
        if: env.HAS_APP_CREDS == 'true'
        id: cross-repo-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: leaflockio

      - uses: actions/checkout@v4
        with:
          repository: leaflockio/core-actions
          ref: ${{ inputs.core-actions-ref }}
          path: .core-actions
          token: ${{ steps.cross-repo-token.outputs.token || github.token }}

      - uses: ./.core-actions/actions/node/setup
        with:
          node-version: ${{ inputs.node-version }}
          working-directory: ${{ inputs.working-directory }}

      - name: Build
        working-directory: ${{ inputs.working-directory }}
        env:
          BUILD_CMD: ${{ inputs.build-command }}
        run: eval "$BUILD_CMD"
