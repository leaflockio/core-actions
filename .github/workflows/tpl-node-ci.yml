name: Node CI

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version to use
        type: string
        required: false
        default: '22'

      working-directory:
        description: Directory containing package.json
        type: string
        required: false
        default: '.'

      lint-command:
        description: Command to run for linting
        type: string
        required: false
        default: npm run lint

      core-actions-ref:
        description: Git ref for core-actions checkout (tag, branch, or SHA)
        type: string
        required: false
        default: 'main'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: leaflockio/core-actions
          ref: ${{ inputs.core-actions-ref }}
          path: .core-actions

      - uses: ./.core-actions/actions/node/setup
        with:
          node-version: ${{ inputs.node-version }}
          working-directory: ${{ inputs.working-directory }}

      - name: Lint
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.lint-command }}

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: leaflockio/core-actions
          ref: ${{ inputs.core-actions-ref }}
          path: .core-actions

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install dependencies
        working-directory: ${{ inputs.working-directory }}
        run: npm ci

      - name: Run coverage
        working-directory: ${{ inputs.working-directory }}
        run: bash .core-actions/scripts/node/coverage.sh
