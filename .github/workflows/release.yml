name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    uses: ./.github/workflows/tpl-release.yml
    secrets:
      APP_ID: ${{ secrets.APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}

  back-merge:
    needs: release
    uses: ./.github/workflows/tpl-back-merge.yml
    secrets:
      APP_ID: ${{ secrets.APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
