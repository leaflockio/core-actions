name: Release

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  release:
    uses: ./.github/workflows/tpl-release.yml
    with:
      release: true
    secrets:
      APP_ID: ${{ secrets.LOCKET_CI_APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.LOCKET_CI_PRIVATE_KEY }}

  back-merge:
    needs: release
    if: needs.release.outputs.new_release_published == 'true'
    uses: ./.github/workflows/tpl-back-merge.yml
    with:
      strategy: force-sync
    secrets:
      APP_ID: ${{ secrets.LOCKET_CI_APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.LOCKET_CI_PRIVATE_KEY }}
