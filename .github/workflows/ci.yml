name: CI

on:
  pull_request:
    branches: [pre-main, main]

permissions:
  contents: read
  pull-requests: read

jobs:
  branch-policy:
    uses: ./.github/workflows/tpl-branch-policy.yml

  quality:
    uses: ./.github/workflows/tpl-common-ci.yml
    with:
      core-actions-ref: ${{ github.head_ref || github.ref_name }}
    secrets:
      GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  shell:
    uses: ./.github/workflows/tpl-shell-ci.yml
    with:
      coverage-tag: shell

  js-test:
    name: JS Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Run JS tests with coverage
        env:
          COVERAGE_TAG: js
          COVERAGE_SCRIPT: test:js:coverage
          COVERAGE_DIR: coverage/js
        run: bash scripts/node/coverage.sh
