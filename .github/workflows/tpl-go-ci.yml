name: Go CI

on:
  workflow_call:
    inputs:
      go-version:
        description: >
          Explicit Go version to use (e.g. '1.26'). When set, takes
          precedence over go-version-file.
        type: string
        required: false
        default: ''

      go-version-file:
        description: >
          Path to go.mod file to determine the Go version. Used when
          go-version is not set. Defaults to go.mod in the working directory.
        type: string
        required: false
        default: 'go.mod'

      working-directory:
        description: Directory containing go.mod
        type: string
        required: false
        default: '.'

      golangci-lint-version:
        description: >
          golangci-lint version to use (e.g. 'v1.64.5'). Defaults to 'latest'
          which always resolves to the newest stable release.
        type: string
        required: false
        default: 'latest'

      build-command:
        description: Command to run for building
        type: string
        required: false
        default: go build ./...

      core-actions-ref:
        description: Git ref for core-actions checkout (tag, branch, or SHA)
        type: string
        required: false
        default: 'main'

      owner:
        description: GitHub owner for app token scope (defaults to repository owner)
        type: string
        required: false
        default: ''

    secrets:
      APP_ID:
        description: GitHub App ID — required when calling from a repo that cannot access core-actions with the default token
        required: false

      APP_PRIVATE_KEY:
        description: GitHub App private key (pairs with APP_ID)
        required: false

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      HAS_APP_CREDS: ${{ secrets.APP_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate cross-repo token
        if: env.HAS_APP_CREDS == 'true'
        id: cross-repo-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ inputs.owner || github.repository_owner }}

      - uses: actions/checkout@v4
        with:
          repository: leaflockio/core-actions
          ref: ${{ inputs.core-actions-ref }}
          path: .git/modules/core-actions
          token: ${{ steps.cross-repo-token.outputs.token || github.token }}

      - uses: ./.git/modules/core-actions/actions/go/setup
        with:
          go-version: ${{ inputs.go-version }}
          go-version-file: ${{ inputs.go-version-file }}
          working-directory: ${{ inputs.working-directory }}

      - name: Check for changed Go files
        id: go-files
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          FILES=$(git diff --name-only --diff-filter=ACMR "$PR_BASE_SHA"...HEAD -- '*.go')
          echo "changed=$( [ -n "$FILES" ] && echo 'true' || echo 'false' )" >> "$GITHUB_OUTPUT"

      - uses: golangci/golangci-lint-action@v6
        if: steps.go-files.outputs.changed == 'true'
        with:
          version: ${{ inputs.golangci-lint-version }}
          working-directory: ${{ inputs.working-directory }}
          only-new-issues: true

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      HAS_APP_CREDS: ${{ secrets.APP_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate cross-repo token
        if: env.HAS_APP_CREDS == 'true'
        id: cross-repo-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ inputs.owner || github.repository_owner }}

      - uses: actions/checkout@v4
        with:
          repository: leaflockio/core-actions
          ref: ${{ inputs.core-actions-ref }}
          path: .git/modules/core-actions
          token: ${{ steps.cross-repo-token.outputs.token || github.token }}

      - uses: ./.git/modules/core-actions/actions/go/setup
        with:
          go-version: ${{ inputs.go-version }}
          go-version-file: ${{ inputs.go-version-file }}
          working-directory: ${{ inputs.working-directory }}

      - name: Run coverage
        working-directory: ${{ inputs.working-directory }}
        run: bash .git/modules/core-actions/scripts/go/coverage.sh

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      HAS_APP_CREDS: ${{ secrets.APP_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate cross-repo token
        if: env.HAS_APP_CREDS == 'true'
        id: cross-repo-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ inputs.owner || github.repository_owner }}

      - uses: actions/checkout@v4
        with:
          repository: leaflockio/core-actions
          ref: ${{ inputs.core-actions-ref }}
          path: .git/modules/core-actions
          token: ${{ steps.cross-repo-token.outputs.token || github.token }}

      - uses: ./.git/modules/core-actions/actions/go/setup
        with:
          go-version: ${{ inputs.go-version }}
          go-version-file: ${{ inputs.go-version-file }}
          working-directory: ${{ inputs.working-directory }}

      - name: Build
        working-directory: ${{ inputs.working-directory }}
        env:
          BUILD_CMD: ${{ inputs.build-command }}
        run: eval "$BUILD_CMD"
