name: Release

on:
  workflow_call:
    inputs:
      release:
        description: Whether to run semantic-release (version bump, tag, publish)
        type: boolean
        required: false
        default: true

      node-version:
        description: Node.js version (semantic-release runs on Node)
        type: string
        required: false
        default: '22'

      working-directory:
        description: Directory containing package.json
        type: string
        required: false
        default: '.'

      extra-plugins:
        description: >
          Space-separated list of extra semantic-release plugins to install
        type: string
        required: false
        default: '@semantic-release/changelog @semantic-release/git @octokit/rest conventional-changelog-conventionalcommits'

      update-major-tag:
        description: Whether to move the major version tag after release (e.g. v1 → v1.2.0)
        type: boolean
        required: false
        default: true

      core-actions-ref:
        description: Git ref for core-actions checkout (tag, branch, or SHA)
        type: string
        required: false
        default: 'main'

      owner:
        description: GitHub owner for app token scope (defaults to repository owner)
        type: string
        required: false
        default: ''

    outputs:
      new_release_published:
        description: Whether a new release was published ('true' or 'false')
        value: ${{ jobs.release.outputs.new_release_published }}

      new_release_version:
        description: Version of the release (e.g. '1.2.3' or '1.2.3-beta.1')
        value: ${{ jobs.release.outputs.new_release_version }}

      major_tag:
        description: The major tag that was updated or created (e.g. 'v1')
        value: ${{ jobs.release.outputs.major_tag }}

      major_tag_action:
        description: What happened to the major tag — 'created', 'updated', or 'skipped'
        value: ${{ jobs.release.outputs.major_tag_action }}

    secrets:
      APP_ID:
        description: GitHub App ID for locket-ci
        required: true

      APP_PRIVATE_KEY:
        description: GitHub App private key for locket-ci
        required: true

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      new_release_published: ${{ steps.release.outputs.new_release_published }}
      new_release_version: ${{ steps.release.outputs.new_release_version }}
      major_tag: ${{ steps.major-tag.outputs.major-tag }}
      major_tag_action: ${{ steps.major-tag.outputs.action }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ inputs.owner || github.repository_owner }}

      - uses: actions/checkout@v4
        with:
          repository: leaflockio/core-actions
          ref: ${{ inputs.core-actions-ref }}
          path: .core-actions
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure git identity
        env:
          APP_ID: ${{ secrets.APP_ID }}
        run: |
          git config user.name "locket-ci[bot]"
          git config user.email "${APP_ID}+locket-ci[bot]@users.noreply.github.com"

      - uses: ./.core-actions/actions/release/semantic-release
        if: inputs.release
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          node-version: ${{ inputs.node-version }}
          working-directory: ${{ inputs.working-directory }}
          extra-plugins: ${{ inputs.extra-plugins }}

      - uses: ./.core-actions/actions/release/update-major-tag
        if: inputs.release && steps.release.outputs.new_release_published == 'true'
        id: major-tag
        with:
          version: ${{ steps.release.outputs.new_release_version }}
          enabled: ${{ inputs.update-major-tag }}
          token: ${{ steps.app-token.outputs.token }}
