# Shell script specific hooks.
# Always use alongside common.yml.

pre-commit:
  piped: true
  jobs:
    - name: shell-checks
      group:
        parallel: true
        jobs:
          - name: check-naming
            run: bash scripts/shell/check-naming.sh
          - name: check-format
            glob: '**/*.sh'
            run: shfmt -d {staged_files}
          - name: check-lint
            glob: '**/*.sh'
            run: shellcheck -x --source-path=SCRIPTDIR {staged_files}

pre-push:
  jobs:
    - name: coverage
      run: bash scripts/shell/coverage.sh --docker
