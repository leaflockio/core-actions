# Node.js / JavaScript / TypeScript specific hooks.
# Always use alongside common.yml.

pre-commit:
  jobs:
    - name: node-checks
      group:
        parallel: true
        jobs:
          - name: check-naming
            run: bash ${HOOKS_SCRIPTS:-scripts}/node/check-naming.sh

pre-push:
  jobs:
    - name: node-push-checks
      group:
        parallel: true
        jobs:
          - name: eslint
            run: npm run lint
          - name: node-coverage
            run: bash ${HOOKS_SCRIPTS:-scripts}/node/coverage.sh
